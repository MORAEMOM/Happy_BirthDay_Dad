<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Sohee Q2</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Pretendard,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin-top:40px;
}

.grid{

    width:90vw;
    max-width:1100px;

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;

}

.grid img{

    width:100%;
    aspect-ratio:3/4;

    object-fit:cover;

    border-radius:20px;

}

.grid img:hover{
    transform:scale(1.03);
}

.correct{
    border:5px solid #3fd15b;
}

.wrong{
    animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

#videoSection{
    display:none;
    opacity:0;
    transition:1.5s;
    text-align:center;
    margin-top:40px;
}

video{
    width:900px;
    max-width:90vw;
    border-radius:15px;
    background:black;
}

iframe{

    width:min(95vw,1000px);

    aspect-ratio:16/9;

    border:none;

    border-radius:20px;

}
button{

    margin:30px auto;

    padding:22px 50px;

    font-size:32px;

    font-weight:700;

    border:none;

    border-radius:18px;

    background:#3fd15b;

    color:white;

    cursor:pointer;

    display:block;

    width:min(90vw,500px);

    box-shadow:0 8px 20px rgba(63,209,91,.35);

    transition:.2s;

}

button:hover{

    transform:scale(1.03);

}
button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<h1>소희의 성장 순서를 맞춰보시오 😎</h1>

<div class="grid" id="game">

    <img src="assets/Sohee_3.jpg" data-order="3">
    <img src="assets/Sohee_2.jpg" data-order="2">
    <img src="assets/Sohee_1.jpg" data-order="1">
    <img src="assets/Sohee_4.jpg" data-order="4">

</div>

<div id="videoSection">

<audio
    id="voice"
    src="assets/Voice1.m4a"
    preload="auto">
</audio>

    <br>

<button
    id="youtubeBtn"
    onclick="openYoutube()"
    style="display:none;">
    🎬 축하 영상 보기
</button>

    <br>

 
    <h2 style="color:#aaa;">
    사진을 맞춰줘서 고마워 ❤️
    </h2>
</div>

<script>

let answer = 1;

document.querySelectorAll(".grid img").forEach(img=>{

    img.onclick=()=>{

        if(Number(img.dataset.order)===answer){

            img.classList.add("correct");

            answer++;

            if(answer===5){

                startVoice();

            }

        }else{

            img.classList.add("wrong");

            setTimeout(()=>{

                img.classList.remove("wrong");

            },300);

        }

    }

});

function startVoice(){

    document.getElementById("game").style.display="none";

    const section=document.getElementById("videoSection");

    section.style.display="block";

    setTimeout(()=>{

        section.style.opacity=1;

    },50);

    const voice=document.getElementById("voice");

    voice.play();

    voice.onended=()=>{

        document.getElementById("youtubeBtn").style.display="inline-block";

    };

}

 function openYoutube() {

    location.href = "https://youtu.be/StWm8ezBOrw";

}

</script>

</body>
</html>
